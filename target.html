<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFRE EXCLUSIVE — FOLLOW.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --accent: #C8FF00; --dark: #070709; --text: #f0f0f8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }
.top-bar { background: var(--accent); color: #000; font-weight: 800; text-align: center; padding: 8px; font-size: 12px; letter-spacing: 1px; }
.container { max-width: 600px; margin: 0 auto; padding: 20px; }
.hero-img { width: 100%; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ffffff10; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; margin-bottom: 15px; letter-spacing: 1px; }
.badge { display: inline-block; background: #ffffff10; padding: 4px 12px; border-radius: 5px; font-size: 12px; color: var(--accent); margin-bottom: 10px; }
.description { color: #a0a0b0; margin-bottom: 25px; font-size: 17px; }
.cta-box { background: #13131a; border: 1px solid #1c1c26; padding: 25px; border-radius: 20px; text-align: center; }
.price { font-family: 'Bebas Neue', sans-serif; font-size: 54px; color: var(--accent); margin-bottom: 5px; }
.old-price { text-decoration: line-through; color: #44445a; font-size: 20px; }
.buy-btn { display: block; width: 100%; background: var(--accent); color: #000; text-decoration: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; margin-top: 15px; transition: 0.3s; box-shadow: 0 10px 20px rgba(200, 255, 0, 0.2); }
.buy-btn:hover { transform: translateY(-3px); }
</style>
</head>
<body>
<div class="top-bar">OFFRE LIMITÉE : PLUS QUE 7 UNITÉS DISPONIBLES</div>
<div class="container">
    <div id="product-content">
        <span class="badge" id="niche-badge">CHARGEMENT...</span>
        <h1 id="main-title">ANALYSE...</h1>
        <img src="" alt="" id="main-img" class="hero-img">
        <p class="description" id="main-desc">Veuillez patienter...</p>
        <div class="cta-box">
            <div class="old-price" id="old-p">--€</div>
            <div class="price" id="new-p">--€</div>
            <a href="#" class="buy-btn" id="buy-link">COMMANDER MAINTENANT</a>
        </div>
    </div>
</div>
<script>
const DATA = {
    'eau': { title: "EAU POTABLE PARTOUT", desc: "Paille filtrante grade militaire.", img: "https://images.unsplash.com/photo-1583321500900-82807e458f3c?w=600", price: "24.90€", old: "49€", link: "#" },
    'energie': { title: "SOLAIRE PORTABLE", desc: "Autonomie totale au soleil.", img: "https://images.unsplash.com/photo-1509391366360-fe5bb6578506?w=600", price: "59€", old: "89€", link: "#" },
    'soin': { title: "SOIN DU DOS PRO", desc: "Soulagement immédiat des tensions.", img: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=600", price: "34.50€", old: "55€", link: "#" },
    'survie': { title: "KIT SURVIE 72H", desc: "Tout le nécessaire tactique.", img: "https://images.unsplash.com/photo-1517059224940-d4af9eec41b7?w=600", price: "47€", old: "95€", link: "#" }
};
const params = new URLSearchParams(window.location.search);
const pId = params.get('p') || 'eau';
const info = DATA[pId];
if (info) {
    document.getElementById('niche-badge').textContent = pId.toUpperCase();
    document.getElementById('main-title').textContent = info.title;
    document.getElementById('main-desc').textContent = info.desc;
    document.getElementById('main-img').src = info.img;
    document.getElementById('new-p').textContent = info.price;
    document.getElementById('old-p').textContent = info.old;
    document.getElementById('buy-link').href = info.link;
}
</script>
</body>
</html>
