<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFRE EXCLUSIVE — FOLLOW. SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #C8FF00; --soin: #FF4444; --text: #fff; --muted: #888; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* HEADER CATÉGORIE */
        .cat-banner { width: 100%; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #111; }
        .banner-eau { color: #00F0FF; }
        .banner-energie { color: #FFD700; }
        .banner-survie { color: var(--accent); }
        .banner-soin { color: var(--soin); border-bottom: 1px solid var(--soin); }

        .product-card { max-width: 500px; width: 90%; margin: 30px 0; background: #080808; border-radius: 30px; padding: 30px; border: 1px solid #111; text-align: center; }
        .product-img { width: 100%; border-radius: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .product-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        .price-box { font-size: 40px; color: var(--accent); font-weight: bold; margin: 20px 0; }
        .old-price { font-size: 20px; color: var(--muted); text-decoration: line-through; margin-right: 10px; }
        
        .btn-buy { background: var(--accent); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 18px; text-decoration: none; display: block; transition: 0.2s; }
        .btn-buy:active { transform: scale(0.98); }
        
        .trust-badge { display: flex; justify-content: center; gap: 15px; margin-top: 20px; opacity: 0.5; }
        .loading { padding: 100px; color: var(--muted); font-family: monospace; }
    </style>
</head>
<body>

<div id="cat-header" class="cat-banner">SYSTÈME DE PRÉPARATION ACTIF</div>

<div id="loading" class="loading">SCANNING_INVENTORY...</div>

<div id="product-container" style="display:none;">
    <div class="product-card">
        <img id="p-img" class="product-img" src="" alt="Produit">
        <div id="p-title" class="product-title">NOM DU PRODUIT</div>
        
        <div class="price-box">
            <span id="p-old" class="old-price"></span>
            <span id="p-price">0.00 €</span>
        </div>
        
        <a id="p-link" href="#" class="btn-buy">VÉRIFIER LA DISPONIBILITÉ</a>
        
        <div class="trust-badge">
            <small>🔒 SSL</small>
            <small>💳 STRIPE</small>
            <small>📦 EXPRESS</small>
        </div>
    </div>
</div>

<script>
    const SHOP_DOMAIN = "ton-shop.myshopify.com"; // TA BOUTIQUE

    // Logique de l'agent de reconnaissance
    const rules = {
        eau: ["filtre", "gourde", "purifier", "water", "straw", "purificateur"],
        energie: ["solaire", "lampe", "torche", "solar", "flashlight", "battery", "panneau"],
        soin: ["trousse", "secours", "bandage", "medical", "first aid", "blanket", "couverture", "soin", "hygiene"],
        survie: ["feu", "hachette", "couteau", "knife", "fire", "tool", "survival", "corde"]
    };

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const productHandle = urlParams.get('p');

        if (!productHandle) {
            document.getElementById('loading').innerText = "Veuillez spécifier un produit.";
            return;
        }

        try {
            const response = await fetch(`https://${SHOP_DOMAIN}/products.json`);
            const data = await response.json();
            const product = data.products.find(p => p.handle === productHandle || p.title.toLowerCase().includes(productHandle.toLowerCase()));

            if (product) {
                const variant = product.variants[0];
                const title = product.title;
                
                // Détection de la catégorie pour le design
                let catFound = "survie";
                for (let cat in rules) {
                    if (rules[cat].some(k => title.toLowerCase().includes(k))) catFound = cat;
                }

                // Mise à jour de l'interface
                document.getElementById('p-title').innerText = title;
                document.getElementById('p-img').src = product.images[0].src;
                document.getElementById('p-price').innerText = variant.price + " €";
                document.getElementById('p-old').innerText = (parseFloat(variant.price) * 1.3).toFixed(2) + " €";
                document.getElementById('p-link').href = `https://${SHOP_DOMAIN}/cart/${variant.id}:1`;
                
                // Style selon la catégorie
                const header = document.getElementById('cat-header');
                header.innerText = "RAYON : " + catFound.toUpperCase();
                header.className = "cat-banner banner-" + catFound;
                if(catFound === 'soin') document.getElementById('p-link').style.background = '#FF4444';

                document.getElementById('loading').style.display = 'none';
                document.getElementById('product-container').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('loading').innerText = "ERREUR DE SYNCHRO";
        }
    }
    init();
</script>
</body>
</html>
