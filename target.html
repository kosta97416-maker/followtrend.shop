<script>
    // Configuration de l'Agent de Tarification & Traduction
    const products = {
        'survie': {
            fr: { title: "KIT DE SURVIE PROFESSIONNEL", tag: "URGENCE" },
            en: { title: "PROFESSIONAL SURVIVAL KIT", tag: "EMERGENCY" },
            es: { title: "KIT DE SUPERVIVENCIA PRO", tag: "EMERGENCIA" },
            prices: { 'EUR': 89, 'USD': 99, 'CHF': 110, 'DEFAULT': 89 }
        },
        'eau': {
            fr: { title: "PURIFICATEUR D'EAU MILITAIRE", tag: "QUALITÉ" },
            en: { title: "MILITARY WATER PURIFIER", tag: "QUALITY" },
            es: { title: "PURIFICADOR DE AGUA MILITAR", tag: "CALIDAD" },
            prices: { 'EUR': 49, 'USD': 55, 'CHF': 60, 'DEFAULT': 49 }
        }
        // Ajoute les autres ici sur le même modèle...
    };

    async function initializeAgent() {
        // 1. L'Agent détecte la localisation du client via une API gratuite
        try {
            const response = await fetch('https://ipapi.co/json/');
            const geo = await response.json();
            
            const lang = geo.languages.split(',')[0].substring(0,2) || 'en'; // fr, en, es...
            const currency = geo.currency || 'EUR';
            
            const params = new URLSearchParams(window.location.search);
            const pId = params.get('p') || 'survie';
            const product = products[pId];

            if(product) {
                // 2. Traduction automatique
                const text = product[lang] || product['en'];
                document.getElementById('title').innerText = text.title;
                document.getElementById('tag').innerText = text.tag;

                // 3. Adaptation du prix au marché
                const priceVal = product.prices[currency] || product.prices['DEFAULT'];
                const symbol = currency === 'USD' ? '$' : (currency === 'CHF' ? ' CHF' : '€');
                
                document.getElementById('price').innerText = priceVal + symbol;
                document.getElementById('old-price').innerText = Math.round(priceVal * 1.6) + symbol;
                
                console.log(`Agent : Client détecté en ${geo.country_name}. Langue: ${lang}, Devise: ${currency}`);
            }
        } catch (error) {
            console.error("Agent : Erreur de détection, passage en mode standard.");
        }
    }

    initializeAgent();
</script>
