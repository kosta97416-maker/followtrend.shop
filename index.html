<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ - Dashboard CEO</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; }
        .column { border: 1px solid #111; padding: 15px; background: rgba(0,20,0,0.2); overflow-y: auto; position: relative; }
        h2 { font-size: 0.9em; border-bottom: 1px solid #00ff00; padding-bottom: 5px; color: #fff; text-transform: uppercase; }
        
        /* Zone d'alerte */
        #order-display { margin-top: 20px; min-height: 200px; }
        
        /* Stats */
        .stat-box { margin-bottom: 20px; }
        .stat-value { font-size: 1.5em; font-weight: bold; }

        /* Barre de test en bas */
        .test-zone {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #111; padding: 15px; display: flex; gap: 10px;
            border-top: 2px solid #00ff00; box-sizing: border-box; z-index: 100;
        }
        input { 
            flex-grow: 1; background: #000; border: 1px solid #00ff00; 
            color: #00ff00; padding: 10px; outline: none; font-family: monospace;
        }
        button { 
            background: #00ff00; color: #000; border: none; padding: 10px 20px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="column">
        <h2>📡 AGENT ÉCLAIREUR</h2>
        <p style="font-size: 0.7em;">SCANNING SOCIAL NETWORKS...</p>
        <div id="order-display">
            </div>
    </div>

    <div class="column">
        <h2>📦 AGENT LOGISTIQUE</h2>
        <div id="inventory-status">
            <p>VÉRIFICATION SHOPIFY...</p>
            <p style="color: #555;">Accès : OK</p>
            <p style="color: #555;">Catalogue : Connecté</p>
        </div>
    </div>

    <div class="column">
        <h2>📈 PERFORMANCE CEO</h2>
        <div class="stat-box">
            <div>REVENUS SHOPIFY</div>
            <div class="stat-value" id="stat-shopify">0.00€</div>
        </div>
        <div class="stat-box">
            <div>REVENUS AMAZON</div>
            <div class="stat-value" id="stat-amazon">0.00€</div>
        </div>
        <div class="stat-box">
            <div>ÉCONOMIE IA (TPS)</div>
            <div class="stat-value" id="stat-ai">0h</div>
        </div>
    </div>
</div>

<div class="test-zone">
    <input type="text" id="ceo-input" placeholder="TAPEZ UN BESOIN (ex: eau, feu, kit)...">
    <button onclick="sendTestAlert()">TESTER L'IA</button>
</div>

<script>
    // Mise à jour automatique du dashboard toutes les 2 secondes
    function updateDashboard() {
        fetch('/api/get-order')
            .then(res => res.text())
            .then(html => {
                document.getElementById('order-display').innerHTML = html;
            });

        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stat-shopify').innerText = data.shopify + "€";
                document.getElementById('stat-amazon').innerText = data.amazon + "€";
                document.getElementById('stat-ai').innerText = data.ai + "h";
            });
    }

    // FONCTION DE TEST CORRIGÉE
    function sendTestAlert() {
        const inputField = document.getElementById('ceo-input');
        const text = inputField.value.trim();

        if (text === "") {
            alert("Veuillez entrer un mot-clé !");
            return;
        }

        // On nettoie l'écran immédiatement pour montrer que ça travaille
        document.getElementById('order-display').innerHTML = "<p style='color:yellow;'>IA en cours d'analyse...</p>";

        console.log("Envoi au serveur : " + text);

        fetch('/api/agent-alert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                keyword: text,
                user_issue: "Test manuel du CEO : " + text,
                platform: "DIRECT_DASHBOARD",
                auth: "CEO_FOLLOW"
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("Réponse reçue :", data);
            // On force le rafraîchissement
            setTimeout(updateDashboard, 500);
        })
        .catch(err => {
            console.error("Erreur :", err);
            alert("Erreur de connexion au serveur Render.");
        });
    }

    setInterval(updateDashboard, 2000);
</script>

</body>
</html>
