<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW_HQ - COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }
        .rev-header { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; border-right: 1px solid var(--border); }
        .rev-val { font-size: 24px; font-weight: bold; color: var(--neon); }
        .rev-label { font-size: 10px; color: #555; display: block; margin-top: 5px; }
        .main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; height: calc(100vh - 90px); }
        .mod { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .mod-h { font-size: 11px; color: var(--neon); margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        textarea { flex: 1; background: #000; border: 1px solid #222; color: #fff; padding: 15px; font-family: 'Space Mono'; resize: none; margin-bottom: 15px; }
        .url-box { background: #000; border: 1px solid #222; padding: 15px; color: var(--neon); word-break: break-all; min-height: 60px; margin-bottom: 15px; }
        .btn { padding: 20px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-prim { background: var(--neon); color: #000; }
        .btn-sec { background: #111; color: #fff; border: 1px solid #222; margin-top: 10px; }
        #inv { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; padding: 40px; }
        .grid-inv { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 15px; }
        .item { background: #000; border: 1px solid #222; padding: 12px; margin-bottom: 10px; cursor: pointer; font-size: 11px; }
        .item:hover { border-color: var(--neon); }
        .close { position: absolute; top: 20px; right: 20px; color: red; cursor: pointer; border: 1px solid red; padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="rev-header">
        <div class="rev-card"><span class="rev-val" id="s1">0.00€</span><span class="rev-label">SHOPIFY</span></div>
        <div class="rev-card"><span class="rev-val" id="s2">0.00€</span><span class="rev-label">AMAZON</span></div>
        <div class="rev-card"><span class="rev-val" id="s3">0.00€</span><span class="rev-label">AI_AGENT</span></div>
    </div>
    <div class="main">
        <div class="mod">
            <div class="mod-h">ORDRE_TACTIQUE (HTML)</div>
            <textarea id="cmd" placeholder="Code HTML pour agents..."></textarea>
            <button class="btn btn-prim" onclick="push()">DÉPLOYER L'ORDRE</button>
        </div>
        <div class="mod">
            <div class="mod-h">MUNITION_ACTUELLE</div>
            <div class="url-box" id="url-v">AUCUN PRODUIT</div>
            <button class="btn btn-prim" style="background:#fff" onclick="copy()">COPIER LIEN</button>
            <button class="btn btn-sec" onclick="sh(1)">OUVRIR INVENTAIRE</button>
        </div>
    </div>
    <div id="inv">
        <div class="close" onclick="sh(0)">FERMER</div>
        <div class="grid-inv">
            <div class="col"><div class="mod-h">EAU</div><div class="item" onclick="sel('eau')">FILTRE_01</div></div>
            <div class="col"><div class="mod-h">ENERGIE</div><div class="item" onclick="sel('energie')">SOLAIRE_01</div></div>
            <div class="col"><div class="mod-h">SOIN</div><div class="item" onclick="sel('soin')">BIO_01</div></div>
            <div class="col"><div class="mod-h">SURVIE</div><div class="item" onclick="sel('survie')">KIT_01</div></div>
        </div>
    </div>
    <script>
        const API = "https://ton-service-render.onrender.com"; 
        function sh(v) { document.getElementById('inv').style.display = v ? 'block' : 'none'; }
        function sel(n) { document.getElementById('url-v').innerText = window.location.origin + "/target.html?p=" + n; sh(0); }
        function copy() { navigator.clipboard.writeText(document.getElementById('url-v').innerText); }
        async function push() {
            const h = document.getElementById('cmd').value;
            const b = btoa(encodeURIComponent(h));
            const r = await fetch(API + "/api/deploy", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ order: b, auth: "CEO_FOLLOW" })
            });
            if(r.ok) alert("DÉPLOYÉ");
        }
    </script>
</body>
</html>
