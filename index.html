<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — ULTIMATE COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --amazon: #FF9900; --ai: #00F0FF; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* HEADER REVENUS RÉELS */
        .revenue-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; }
        .rev-val { font-size: 22px; font-weight: bold; display: block; }
        .rev-label { font-size: 9px; letter-spacing: 2px; color: #555; margin-top: 5px; text-transform: uppercase; }

        /* DASHBOARD GRID */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; height: calc(100vh - 85px); }
        .module { background: var(--panel); border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; position: relative; }
        .module-header { font-size: 10px; color: var(--neon); margin-bottom: 15px; letter-spacing: 2px; }

        /* INPUTS & TEXTAREA */
        textarea, .url-input { width: 100%; background: #000; border: 1px solid #333; color: var(--neon); padding: 15px; font-family: 'Space Mono'; margin-bottom: 15px; outline: none; }
        textarea { flex: 1; font-size: 11px; }

        /* BOUTONS */
        .btn { padding: 18px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; border: none; text-transform: uppercase; font-weight: bold; }
        .btn-deploy { background: var(--neon); color: #000; }
        .btn-catalog { background: #111; color: #fff; border: 1px solid #222; margin-top: 10px; }
        
        /* OVERLAY 4 COLONNES */
        #inventory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; padding: 40px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 80vh; margin-top: 20px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        .col-title { color: var(--neon); font-size: 11px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #ff4444; cursor: pointer; font-size: 10px; border: 1px solid #ff4444; padding: 5px 10px; }
        .prod-card { background: #000; border: 1px solid #222; padding: 10px; margin-bottom: 10px; cursor: pointer; font-size: 10px; }
        .prod-card:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div class="revenue-header">
        <div class="rev-card"><span class="rev-val" style="color:var(--neon)">0.00€</span><span class="rev-label">SHOPIFY LIVE</span></div>
        <div class="rev-card"><span class="rev-val" style="color:var(--amazon)">0.00€</span><span class="rev-label">AMAZON AFFILIATE</span></div>
        <div class="rev-card"><span class="rev-val" style="color:var(--ai)">0.00€</span><span class="rev-label">AI_AGENT COMMS</span></div>
    </div>

    <div class="main-grid">
        <div class="module">
            <div class="module-header">COMMANDE_TACTIQUE (HTML/SCRIPT)</div>
            <textarea id="order-content" placeholder="Insérez le code pour les agents ici..."></textarea>
            <button class="btn btn-deploy" onclick="sendOrder()">DÉPLOYER L'ORDRE</button>
        </div>

        <div class="module">
            <div class="module-header">MUNITION_ACTUELLE</div>
            <input type="text" id="current-link" class="url-input" value="En attente...">
            <button class="btn btn-deploy" style="background:#fff" onclick="copyMunition()">COPIER MUNITION</button>
            <button class="btn btn-catalog" onclick="openInv()">📦 ACCÉDER À L'INVENTAIRE</button>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="close-btn" onclick="closeInv()">[ FERMER ]</div>
        <div class="inventory-grid">
            <div class="col"><div class="col-title">💧 EAU</div><div class="prod-card" onclick="setLink('eau')">UNITÉ_FILTRE_01</div></div>
            <div class="col"><div class="col-title">⚡ ENERGIE</div><div class="prod-card" onclick="setLink('energie')">PANNEAU_SOLAIRE_01</div></div>
            <div class="col"><div class="col-title">🧘 SOIN</div><div class="prod-card" onclick="setLink('soin')">BACK_PRO_01</div></div>
            <div class="col"><div class="col-title">🎒 SURVIE</div><div class="prod-card" onclick="setLink('survie')">PACK_SURVIE_01</div></div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://ton-service-render.onrender.com"; // TA VRAIE URL ICI

        function openInv() { document.getElementById('inventory-overlay').style.display = 'block'; }
        function closeInv() { document.getElementById('inventory-overlay').style.display = 'none'; }
        
        function setLink(p) {
            document.getElementById('current-link').value = window.location.origin + "/target.html?p=" + p;
            closeInv();
        }

        async function copyMunition() {
            await navigator.clipboard.writeText(document.getElementById('current-link').value);
            alert("Copié.");
        }

        // L'ENVOI D'ORDRE BLINDÉ
        async function sendOrder() {
            const rawHtml = document.getElementById('order-content').value;
            if(!rawHtml) return;

            // Encodage Base64 pour que le code passe les barrières de sécurité
            const encodedData = btoa(encodeURIComponent(rawHtml));

            try {
                const response = await fetch(`${RENDER_URL}/api/deploy`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ order: encodedData, auth: "CEO_FOLLOW" })
                });
                if(response.ok) alert("ORDRE TRANSMIS.");
            } catch (e) { alert("ERREUR LIAISON RENDER."); }
        }
    </script>
</body>
</html>
