<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW HQ - Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-green: #00ff00;
            --border-color: #333;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains+Mono', monospace;
            margin: 0;
            padding: 10px; /* Réduit */
            display: flex;
            flex-direction: column;
            height: 98vh; /* Évite le scroll */
            overflow: hidden;
        }

        /* HEADER & STATS */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-green);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .logo { font-size: 0.9em; font-weight: bold; }

        .stats-bar {
            display: flex;
            gap: 10px;
        }

        .stat-item {
            background: var(--panel-bg);
            padding: 2px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.8em;
        }

        .stat-item span {
            color: var(--accent-green);
        }

        /* MAIN DASHBOARD */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex-grow: 1;
            min-height: 0; /* Important pour le flex */
        }

        .column {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .column-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            padding-bottom: 5px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85em;
        }

        .content-area {
            flex-grow: 1;
            font-size: 0.75em; /* Plus compact */
            line-height: 1.2;
            color: #888;
        }

        /* CONSOLE & INPUT RÉDUITS */
        .console-area {
            margin-top: 10px;
            background: #000;
            border: 1px solid var(--accent-green);
            padding: 8px;
            height: 70px; /* Plus petit */
            overflow-y: auto;
            font-size: 0.7em;
            color: #00ff00;
        }

        .input-line {
            display: flex;
            margin-top: 8px;
            gap: 8px;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid var(--accent-green);
            color: white;
            padding: 8px;
            font-size: 0.8em;
            font-family: inherit;
        }

        button {
            background: var(--accent-green);
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
        }

        /* ANIMATION ACTIVE */
        .active-dispatch {
            border: 2px solid var(--accent-green) !important;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.2);
            background: #1a1a1a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FOLLOW_HQ // CEO_ACCESS</div>
        <div class="stats-bar">
            <div class="stat-item">SHOPIFY: <span id="stat-shopify">0.00€</span></div>
            <div class="stat-item">AMAZON: <span id="stat-amazon">0.00€</span></div>
            <div class="stat-item">AI_ADS: <span id="stat-ai">0.00€</span></div>
        </div>
    </header>

    <div class="dashboard">
        <div class="column" id="eau">
            <div class="column-header">01_EAU</div>
            <div class="content-area">LOG: Prêt pour analyse de pureté...</div>
        </div>
        <div class="column" id="energie">
            <div class="column-header">02_ENERGIE</div>
            <div class="content-area">LOG: Monitoring des tensions...</div>
        </div>
        <div class="column" id="soin">
            <div class="column-header">03_SOIN</div>
            <div class="content-area">LOG: Inventaire médical OK...</div>
        </div>
        <div class="column" id="survie">
            <div class="column-header">04_SURVIE</div>
            <div class="content-area">LOG: Protocoles 72h chargés...</div>
        </div>
    </div>

    <div class="console-area" id="console">
        > SYSTEM BOOT... OK<br>
        > DASHBOARD COMPACT MODE ACTIVE.
    </div>

    <div class="input-line">
        <input type="text" id="user-input" placeholder="Analyse rapide client...">
        <button onclick="manualDispatch()">DISPATCH</button>
    </div>

    <script>
        const decisionTable = {
            'eau': ['filtre', 'potable', 'soif', 'pollution', 'bacterie', 'riviere', 'survie', 'eau'],
            'energie': ['batterie', 'solaire', 'panneau', 'blackout', 'electricite', 'lumiere', 'coupure', 'courant'],
            'soin': ['blessure', 'infection', 'douleur', 'pharmacie', 'soin', 'pansement', 'sante', 'hopital'],
            'survie': ['sac', 'evacuation', 'campement', 'abri', 'froid', 'boussole', '72h', 'foret']
        };

        function logConsole(msg) {
            const cons = document.getElementById('console');
            cons.innerHTML += `<br>> ${msg}`;
            cons.scrollTop = cons.scrollHeight;
        }

        function manualDispatch() {
            const input = document.getElementById('user-input');
            dispatchRequest(input.value);
            input.value = '';
        }

        function dispatchRequest(message) {
            const msg = message.toLowerCase();
            let target = null;
            for (const [column, keywords] of Object.entries(decisionTable)) {
                if (keywords.some(kw => msg.includes(kw))) { target = column; break; }
            }
            if (target) {
                activateColumn(target);
                logConsole(`CIBLE : [${target.toUpperCase()}]`);
            } else {
                logConsole(`ERROR: NO TARGET`);
            }
        }

        function activateColumn(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-dispatch'));
            const col = document.getElementById(id);
            if (col) {
                col.classList.add('active-dispatch');
                setTimeout(() => col.classList.remove('active-dispatch'), 3000);
            }
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('stat-shopify').innerText = data.shopify + "€";
                document.getElementById('stat-amazon').innerText = data.amazon + "€";
                document.getElementById('stat-ai').innerText = data.ai + "€";
            } catch (e) {}
        }
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
