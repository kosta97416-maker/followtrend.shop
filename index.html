<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW_HQ — COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #C8FF00; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --amazon: #FF9900; --ai: #00F0FF; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }

        /* HEADER REVENUS RÉELS */
        .revenue-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .rev-card { background: var(--bg); padding: 20px; text-align: center; }
        .rev-val { font-size: 22px; font-weight: bold; display: block; }
        .rev-label { font-size: 9px; letter-spacing: 2px; color: #555; margin-top: 5px; text-transform: uppercase; }
        .shopify { color: var(--neon); }
        .amazon { color: var(--amazon); }
        .ai-aff { color: var(--ai); }

        /* DASHBOARD CENTRAL */
        .main-container { height: calc(100vh - 85px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .url-box { width: 100%; max-width: 750px; background: var(--panel); border: 1px solid var(--border); padding: 40px; position: relative; }
        .url-input { width: 100%; background: #000; border: 1px solid #222; padding: 18px; color: var(--neon); font-family: 'Space Mono'; font-size: 14px; outline: none; }
        
        .action-btns { display: flex; gap: 15px; width: 100%; max-width: 750px; margin-top: 25px; }
        .btn { flex: 1; padding: 20px; cursor: pointer; font-family: 'Syncopate'; font-size: 11px; border: 1px solid var(--border); transition: 0.3s; text-transform: uppercase; }
        .btn-catalog { background: var(--neon); color: #000; font-weight: bold; border: none; }
        .btn-copy { background: #000; color: #fff; border: 1px solid #333; }

        /* INVENTAIRE OVERLAY */
        #inventory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; padding: 40px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; height: calc(100vh - 150px); margin-top: 30px; }
        .col { background: var(--panel); border: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .col-title { color: var(--neon); font-size: 13px; font-family: 'Syncopate'; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #ff4444; cursor: pointer; font-size: 11px; border: 1px solid #ff4444; padding: 8px 15px; font-family: 'Syncopate'; }

        .prod-card { background: #000; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 10px; cursor: pointer; font-size: 11px; }
        .prod-card:hover { border-color: var(--neon); }
    </style>
</head>
<body>

    <div class="revenue-header">
        <div class="rev-card">
            <span class="rev-val shopify" id="shop-total">0.00€</span>
            <span class="rev-label">SHOPIFY LIVE</span>
        </div>
        <div class="rev-card">
            <span class="rev-val amazon" id="amz-total">0.00€</span>
            <span class="rev-label">AMAZON LIVE</span>
        </div>
        <div class="rev-card">
            <span class="rev-val ai-aff" id="ai-total">0.00€</span>
            <span class="rev-label">AI_AGENT LIVE</span>
        </div>
    </div>

    <div class="main-container">
        <div class="url-box">
            <div style="font-size: 10px; color: #444; margin-bottom: 10px;">URL_ACTUELLE :</div>
            <input type="text" class="url-input" id="current-url" value="En attente de sélection...">
        </div>
        <div class="action-btns">
            <button class="btn btn-catalog" onclick="openInventory()">OUVRIR INVENTAIRE</button>
            <button class="btn btn-copy" id="copy-btn" onclick="copyLink()">COPIER MUNITION</button>
        </div>
    </div>

    <div id="inventory-overlay">
        <div class="close-btn" onclick="closeInventory()">[ FERMER ]</div>
        <div style="font-family: 'Syncopate'; font-size: 20px;">SÉLECTION_PRODUIT</div>
        <div class="inventory-grid">
            <div class="col" id="col-eau"><div class="col-title">💧 EAU</div></div>
            <div class="col" id="col-energie"><div class="col-title">⚡ ÉNERGIE</div></div>
            <div class="col" id="col-soin"><div class="col-title">🧘 SOIN</div></div>
            <div class="col" id="col-survie"><div class="col-title">🎒 SURVIE</div></div>
        </div>
    </div>

    <script>
        const RENDER_API = "https://ton-service-render.onrender.com"; 

        function openInventory() { document.getElementById('inventory-overlay').style.display = 'block'; }
        function closeInventory() { document.getElementById('inventory-overlay').style.display = 'none'; }

        // Met à jour le lien et ferme l'inventaire
        function setNiche(id) {
            document.getElementById('current-url').value = window.location.origin + "/target.html?p=" + id;
            closeInventory();
        }

        async function copyLink() {
            const input = document.getElementById("current-url");
            await navigator.clipboard.writeText(input.value);
            const btn = document.getElementById("copy-btn");
            btn.innerText = "✅ COPIÉ";
            setTimeout(() => { btn.innerText = "COPIER MUNITION"; }, 2000);
        }

        // ICI : Fonction pour aller chercher les VRAIS chiffres sur Render
        async function updateRealStats() {
            try {
                const response = await fetch(`${RENDER_API}/api/stats`);
                const data = await response.json();
                document.getElementById('shop-total').innerText = data.shopify + "€";
                document.getElementById('amz-total').innerText = data.amazon + "€";
                document.getElementById('ai-total').innerText = data.ai + "€";
            } catch (e) { console.log("En attente des données réelles..."); }
        }

        // Vérifie les stats toutes les 30 secondes
        setInterval(updateRealStats, 30000);
    </script>
</body>
</html>
