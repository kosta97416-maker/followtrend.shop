<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FOLLOW. — Bientôt disponible</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070709;color:#f0f0f8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:8px;margin-bottom:16px}
.logo span{color:#C8FF00}
.line{width:60px;height:2px;background:#C8FF00;margin:0 auto 24px}
h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#C8FF00;margin-bottom:12px}
p{color:#44445a;font-size:15px;line-height:1.8;max-width:400px;margin:0 auto 32px}
.notify{display:flex;gap:10px;max-width:380px;margin:0 auto}
.notify input{flex:1;background:#0f0f12;border:1px solid #1c1c26;border-radius:8px;padding:12px 16px;color:#f0f0f8;font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.notify input:focus{border-color:#C8FF00}
.notify button{background:#C8FF00;color:#080808;border:none;border-radius:8px;padding:12px 20px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.badges{display:flex;gap:10px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.badge{background:#0f0f12;border:1px solid #1c1c26;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;color:#44445a}
</style>
</head>
<body>
<div>
  <div class="logo">FOLLOW<span>.</span></div>
  <div class="line"></div>
  <h2>BIENTÔT DISPONIBLE</h2>
  <p>Nous préparons quelque chose d'exceptionnel. Laisse ton email pour être le premier informé du lancement.</p>
  <div class="notify">
    <input type="email" placeholder="ton@email.com"/>
    <button>Notifier</button>
  </div>
  <div class="badges">
    <span class="badge">🌍 150+ pays</span>
    <span class="badge">💳 Paiement sécurisé</span>
    <span class="badge">↩️ Retour 30 jours</span>
  </div>
</div>
</body>
</html>
