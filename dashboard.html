<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CEO Dashboard - FollowTrend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px 25px; border-radius: 10px; margin-bottom: 30px; }
        .btn-view { background: black; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; border: 1px solid #333; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .btn-view:hover { background: #333; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="target.html?p=eau" target="_blank" class="btn-view">
            <i class="fas fa-eye"></i> VOIR LA PAGE
        </a>
        <h1>CEO DASHBOARD</h1>
        <div style="width: 120px;"></div> </div>

    <div class="card">
        <h2>Bienvenue, CEO</h2>
        <p>Vos agents travaillent en arrière-plan.</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <p style="color: #00ff00;">● Système de vente en ligne : ACTIF</p>
    </div>

    <script>
        // Sécurité par Code PIN au chargement
        let pass = prompt("Entrez votre code PIN CEO :");
        if (pass !== "1234") {
            alert("Accès refusé");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
