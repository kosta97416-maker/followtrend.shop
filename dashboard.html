<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW. CEO — SYSTEM CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03030a; --card: #0d0d18; --accent: #C8FF00; --amazon: #FF9900; --ai: #00F0FF; --text: #fff; --border: #141428; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        
        /* ECRAN PIN */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .pin-input { background: #000; border: 2px solid var(--border); border-radius: 10px; color: var(--accent); padding: 15px; font-size: 30px; text-align: center; width: 160px; outline: none; font-family: 'DM Mono'; }
        .btn-unlock { background: var(--accent); color: #000; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* DASHBOARD */
        #main-dashboard { display: none; max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; }

        /* SECTION 1 : FINANCES (LES 3 BARRES) */
        .grid-cash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .cash-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .bar-bg { background: #000; height: 12px; border-radius: 6px; margin: 20px 0; border: 1px solid #111; }
        .bar-fill { height: 100%; border-radius: 6px; width: 0%; transition: 1.5s ease-out; }
        .btn-add { background: none; border: 1px solid #333; color: #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        /* SECTION 2 : CONFIGURATION URL (BIEN VISIBLE) */
        .url-config { background: #08080f; border: 2px solid var(--accent); border-radius: 15px; padding: 25px; margin-bottom: 40px; text-align: center; }
        .url-input { background: #000; border: 1px solid #333; color: var(--accent); padding: 15px; width: 60%; border-radius: 8px; font-family: 'DM Mono'; outline: none; margin-right: 10px; font-size: 14px; }
        .btn-sync { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* SECTION 3 : EXTENSION LIVE OPS */
        .ext-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .ext-header { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .niche-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .niche-col { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #111; text-align: center; }
        .agent-pick { background: #0d0d18; padding: 10px; border-radius: 8px; border: 1px solid #1a1a2e; margin-top: 10px; }
        .agent-pick img { width: 100%; border-radius: 5px; margin-bottom: 10px; min-height: 100px; object-fit: cover; background: #111; }
        .prod-label { font-size: 11px; font-weight: bold; color: #888; display: block; height: 32px; overflow: hidden; }

        @media (max-width: 850px) { .grid-cash, .niche-grid { grid-template-columns: 1fr; } .url-input { width: 100%; margin-bottom: 10px; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="logo">FOLLOW<span style="color:var(--accent)">.</span> CEO</div>
        <p style="font-size:12px; color:#444;">ENTREZ LE CODE D'ACCÈS</p>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="••••">
        <button class="btn-unlock" onclick="checkPin()">DÉVERROUILLER</button>
    </div>

    <div id="main-dashboard">
        <div class="header">
            <div class="logo">FOLLOW. <span style="color:var(--accent)">CEO</span></div>
            <div id="clock" style="font-family:'DM Mono'; font-size:12px; color:#444;">00:00:00</div>
        </div>

        <div class="grid-cash">
            <div class="cash-card">
                <div style="font-size:10px; letter-spacing:2px; color:#555;">SHOPIFY CASHFLOW</div>
                <div id="val-shop" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
                <div class="bar-bg"><div id="bar-shop" class="bar-fill" style="background:var(--accent)"></div></div>
                <button class="btn-add" onclick="updateCash('shop')">+ Ajouter Gain</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; letter-spacing:2px; color:#555;">AMAZON AFFILIATE</div>
                <div id="val-ama" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
                <div class="bar-bg"><div id="bar-ama" class="bar-fill" style="background:var(--amazon)"></div></div>
                <button class="btn-add" onclick="updateCash('ama')">+ Ajouter Gain</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; letter-spacing:2px; color:#555;">IA SERVICES (SaaS)</div>
                <div id="val-ia" style="font-size:32px; font-weight:bold; margin:10px 0;">0 €</div>
                <div class="bar-bg"><div id="bar-ia" class="bar-fill" style="background:var(--ai)"></div></div>
                <button class="btn-add" onclick="updateCash('ia')">+ Ajouter Gain</button>
            </div>
        </div>

        <div class="url-config">
            <div style="font-size:13px; font-weight:bold; margin-bottom:15px; color:var(--accent);">ENTREZ L'URL DE VOTRE SHOP SHOPIFY :</div>
            <input type="text" id="target-url" class="url-input" placeholder="exemple.myshopify.com">
            <button class="btn-sync" onclick="syncMachine()">SYNCHRONISER</button>
        </div>

        <div class="ext-container">
            <div class="ext-header">
                <span>📡 EXTENSION : LIVE PROSPECTION AGENTS</span>
                <span style="font-size:10px; color:#444; font-family:'DM Mono';">STATUS: CONNECTED</span>
            </div>
            <div class="niche-grid">
                <div class="niche-col">
                    <div style="color:#00F0FF; font-size:10px; font-weight:bold; margin-bottom:10px;">💧 EAU</div>
                    <div class="agent-pick">
                        <img src="" id="img-eau" onerror="this.src='https://via.placeholder.com/100?text=SCAN...'">
                        <span class="prod-label" id="title-eau">Recherche...</span>
                    </div>
                </div>
                <div class="niche-col">
                    <div style="color:#FFD700; font-size:10px; font-weight:bold; margin-bottom:10px;">⚡ ENERGIE</div>
                    <div class="agent-pick">
                        <img src="" id="img-energie" onerror="this.src='https://via.placeholder.com/100?text=SCAN...'">
                        <span class="prod-label" id="title-energie">Recherche...</span>
                    </div>
                </div>
                <div class="niche-col">
                    <div style="color:#ff4444; font-size:10px; font-weight:bold; margin-bottom:10px;">💊 SOIN</div>
                    <div class="agent-pick">
                        <img src="" id="img-soin" onerror="this.src='https://via.placeholder.com/100?text=SCAN...'">
                        <span class="prod-label" id="title-soin">Recherche...</span>
                    </div>
                </div>
                <div class="niche-col">
                    <div style="color:var(--accent); font-size:10px; font-weight:bold; margin-bottom:10px;">🎒 SURVIE</div>
                    <div class="agent-pick">
                        <img src="" id="img-survie" onerror="this.src='https://via.placeholder.com/100?text=SCAN...'">
                        <span class="prod-label" id="title-survie">Recherche...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN_CODE = "7890";
        let stats = { shop: 0, ama: 0, ia: 0, goal: 10000 };

        // 1. Gestion du Verrouillage
        function checkPin() {
            if(document.getElementById('pin-code').value === PIN_CODE) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                // Charger l'URL si mémorisée
                const savedUrl = localStorage.getItem('ceo_url');
                if(savedUrl) {
                    document.getElementById('target-url').value = savedUrl;
                    fetchPicks(savedUrl);
                }
            } else {
                alert("CODE INCORRECT");
                document.getElementById('pin-code').value = "";
            }
        }

        // 2. Gestion des Finances
        function updateCash(key) {
            let val = prompt("Montant (€) :");
            if(val) {
                stats[key] += parseFloat(val);
                document.getElementById('val-'+key).innerText = stats[key].toLocaleString() + " €";
                document.getElementById('bar-'+key).style.width = Math.min((stats[key]/stats.goal)*100, 100) + "%";
            }
        }

        // 3. Synchronisation avec l'URL Visible
        function syncMachine() {
            const url = document.getElementById('target-url').value;
            if(!url) return alert("ENTRE L'URL DE TON SHOP");
            localStorage.setItem('ceo_url', url);
            fetchPicks(url);
        }

        // 4. Récupération des données Shopify
        async function fetchPicks(url) {
            try {
                const response = await fetch(`https://${url}/products.json`);
                const data = await response.json();
                
                const update = (keywords, tId, iId) => {
                    const p = data.products.find(p => keywords.some(k => p.title.toLowerCase().includes(k)));
                    if(p) {
                        document.getElementById(tId).innerText = p.title.substring(0, 25) + "...";
                        document.getElementById(iId).src = p.images[0].src;
                    }
                };

                update(["filtre", "gourde", "water"], "title-eau", "img-eau");
                update(["solaire", "panneau", "solar", "flashlight"], "title-energie", "img-energie");
                update(["trousse", "soin", "medical", "bandage"], "title-soin", "img-soin");
                update(["couteau", "survival", "hache", "knife"], "title-survie", "img-survie");
                
            } catch(e) { alert("ERREUR DE CONNEXION AU SHOP"); }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
