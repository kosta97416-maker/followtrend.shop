<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard CEO - FollowTrend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-nav { background: black; color: white; border: 1px solid #444; padding: 10px 20px; cursor: pointer; text-decoration: none; margin: 10px; display: inline-block; border-radius: 5px; }
        .btn-nav:hover { background: #333; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        #content { display: none; }
        .status-online { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-gate" class="card">
        <h2>🔒 Accès Sécurisé CEO</h2>
        <input type="password" id="pinCode" placeholder="Entrez le code PIN">
        <br>
        <button class="btn-nav" onclick="checkPin()">Se connecter</button>
    </div>

    <div id="content">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: auto;">
            <a href="target.html?p=eau" target="_blank" class="btn-nav" title="Voir la boutique live">
                <i class="fas fa-eye"></i> Voir ma boutique
            </a>
            <h1>TABLEAU DE BORD AGENTS</h1>
            <button onclick="logout()" class="btn-nav">Déconnexion</button>
        </div>

        <div class="card">
            <h3>🤖 État des Agents</h3>
            <p>Agent de Traduction : <span class="status-online">OPÉRATIONNEL</span></p>
            <p>Agent de Prix : <span class="status-online">ACTIF</span></p>
            <p>Base de données : <span style="color:orange;">CONNECTÉE (Cloud)</span></p>
        </div>
    </div>

    <script>
        // Ta Sécurité PIN
        function checkPin() {
            const pin = document.getElementById('pinCode').value;
            if (pin === "9741") { // Remplace 1234 par ton nouveau code si tu l'as changé
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                sessionStorage.setItem('accessGranted', 'true');
            } else {
                alert("Code incorrect !");
            }
        }

        function logout() {
            sessionStorage.removeItem('accessGranted');
            location.reload();
        }

        // Protection contre l'accès direct par URL
        window.onload = function() {
            if (sessionStorage.getItem('accessGranted') === 'true') {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            }
        }
    </script>
</body>
</html>
