<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FOLLOW. CEO — SYSTEM CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03030a; --card: #0d0d18; --accent: #C8FF00; --amazon: #FF9900; --ai: #00F0FF; --text: #fff; --border: #141428; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .pin-input { background: #000; border: 2px solid var(--border); border-radius: 10px; color: var(--accent); padding: 15px; font-size: 30px; text-align: center; width: 160px; outline: none; font-family: 'DM Mono'; }
        .btn-unlock { background: var(--accent); color: #000; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-dashboard { display: none; max-width: 1000px; margin: 0 auto; }
        .grid-cash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .cash-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .bar-bg { background: #000; height: 12px; border-radius: 6px; margin: 20px 0; border: 1px solid #111; }
        .bar-fill { height: 100%; border-radius: 6px; width: 0%; transition: 1.5s ease-out; }
        .url-config { background: #08080f; border: 2px solid var(--accent); border-radius: 15px; padding: 25px; margin-bottom: 40px; text-align: center; }
        .url-input { background: #000; border: 1px solid #333; color: var(--accent); padding: 15px; width: 60%; border-radius: 8px; font-family: 'DM Mono'; outline: none; }
        .niche-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .niche-col { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #111; text-align: center; }
        .agent-pick img { width: 100%; border-radius: 5px; min-height: 100px; object-fit: cover; background: #111; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div style="font-family: 'Bebas Neue'; font-size: 40px;">FOLLOW<span style="color:var(--accent)">.</span> CEO</div>
        <input type="password" id="pin-code" class="pin-input" maxlength="4" placeholder="••••">
        <button class="btn-unlock" onclick="checkPin()">ACCÉDER</button>
    </div>

    <div id="main-dashboard">
        <div class="grid-cash">
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">SHOPIFY CASHFLOW</div>
                <div id="val-shop" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-shop" class="bar-fill" style="background:var(--accent)"></div></div>
                <button onclick="updateCash('shop')">+ Gain</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">AMAZON</div>
                <div id="val-ama" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-ama" class="bar-fill" style="background:var(--amazon)"></div></div>
                <button onclick="updateCash('ama')">+ Gain</button>
            </div>
            <div class="cash-card">
                <div style="font-size:10px; color:#555;">IA SERVICES</div>
                <div id="val-ia" style="font-size:32px; font-weight:bold;">0 €</div>
                <div class="bar-bg"><div id="bar-ia" class="bar-fill" style="background:var(--ai)"></div></div>
                <button onclick="updateCash('ia')">+ Gain</button>
            </div>
        </div>

        <div class="url-config">
            <div style="color:var(--accent); margin-bottom:10px;">URL PUBLIQUE (ex: followtrend.shop)</div>
            <input type="text" id="target-url" class="url-input" placeholder="followtrend.shop">
            <button onclick="syncMachine()" style="padding:15px; cursor:pointer; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">SYNCHRONISER</button>
        </div>

        <div class="niche-grid">
            <div class="niche-col"><div style="color:#00F0FF; font-size:10px;">💧 EAU</div><div class="agent-pick"><img src="" id="img-eau"><span id="title-eau" style="font-size:10px;">...</span></div></div>
            <div class="niche-col"><div style="color:#FFD700; font-size:10px;">⚡ ENERGIE</div><div class="agent-pick"><img src="" id="img-energie"><span id="title-energie" style="font-size:10px;">...</span></div></div>
            <div class="niche-col"><div style="color:#ff4444; font-size:10px;">💊 SOIN</div><div class="agent-pick"><img src="" id="img-soin"><span id="title-soin" style="font-size:10px;">...</span></div></div>
            <div class="niche-col"><div style="color:var(--accent); font-size:10px;">🎒 SURVIE</div><div class="agent-pick"><img src="" id="img-survie"><span id="title-survie" style="font-size:10px;">...</span></div></div>
        </div>
    </div>

    <script>
        const PIN = "9741";
        let stats = { shop: 0, ama: 0, ia: 0 };

        function checkPin() {
            if(document.getElementById('pin-code').value === PIN) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                if(localStorage.getItem('saved_url')) {
                    document.getElementById('target-url').value = localStorage.getItem('saved_url');
                    fetchPicks(localStorage.getItem('saved_url'));
                }
            } else { alert("PIN FAUX"); }
        }

        function updateCash(key) {
            let val = prompt("Montant (€) :");
            if(val) {
                stats[key] += parseFloat(val);
                document.getElementById('val-'+key).innerText = stats[key] + " €";
                document.getElementById('bar-'+key).style.width = Math.min((stats[key]/10000)*100, 100) + "%";
            }
        }

        function syncMachine() {
            let url = document.getElementById('target-url').value.trim();
            url = url.replace("https://", "").replace("http://", "").split('/')[0]; // Nettoie l'URL
            localStorage.setItem('saved_url', url);
            fetchPicks(url);
        }

        async function fetchPicks(url) {
            try {
                const res = await fetch(`https://${url}/products.json`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                const up = (k, tId, iId) => {
                    const p = data.products.find(x => k.some(y => x.title.toLowerCase().includes(y)));
                    if(p) { 
                        document.getElementById(tId).innerText = p.title.substring(0,15); 
                        document.getElementById(iId).src = p.images[0].src; 
                    }
                };
                up(["filtre", "gourde"], "title-eau", "img-eau");
                up(["solaire", "panneau"], "title-energie", "img-energie");
                up(["soin", "medical"], "title-soin", "img-soin");
                up(["survie", "survival"], "title-survie", "img-survie");
            } catch(e) { alert("ERREUR : UTILISE L'URL PUBLIQUE (PAS ADMIN)"); }
        }
    </script>
</body>
</html>
