<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FOLLOW. — Bureau CEO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#03030a;--surface:#08080f;--card:#0d0d18;--border:#141428;
  --accent:#C8FF00;--gold:#FFD700;--red:#FF4444;--blue:#00D4FF;--green:#00FF88;
  --text:#eeeef8;--muted:#3a3a5a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

.nav-admin { background:#000; padding:10px 24px; display:flex; gap:12px; border-bottom:1px solid #222; position: sticky; top:0; z-index: 2000; }
.nav-admin a { color:var(--accent); font-size:11px; text-decoration:none; border:1px solid var(--accent); padding:6px 12px; border-radius:6px; font-weight: bold; text-transform: uppercase; }

.lock{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.lock-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:8px;}
.lock-logo span{color:var(--accent)}
.lock-input{background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:14px 20px;font-family:'DM Mono',monospace;font-size:18px;text-align:center;letter-spacing:8px;width:220px;outline:none}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;}
.header-logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px}

main{max-width:1200px;margin:0 auto;padding:32px 24px}
.hero-balance{background:linear-gradient(135deg,var(--card),#080812);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:24px; text-align:center;}
.balance-amount{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--accent);line-height:1}

.grid-stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; }
.stat-title { font-size:10px; letter-spacing:2px; color:var(--muted); font-weight:700; margin-bottom:10px; text-transform:uppercase;}
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:32px; }

.btn-update { background:var(--accent); color:#000; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px; }
.btn-virement { background:transparent; color:var(--gold); border:1px solid var(--gold); padding:10px; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px; font-size:12px;}
</style>
</head>
<body>

<div class="nav-admin">
    <a href="index.html">🚀 ACCÈS AGENTS</a>
    <a href="target.html?p=eau" target="_blank">👁️ VOIR PAGE VENTE</a>
</div>

<div class="lock" id="lock">
  <div class="lock-logo">FOLLOW<span>.</span></div>
  <input class="lock-input" id="lock-input" type="password" placeholder="••••" maxlength="4"/>
  <button class="lock-btn" onclick="unlock()" style="background:var(--accent); border:none; padding:10px 40px; border-radius:10px; font-weight:bold; cursor:pointer;">ENTRER</button>
</div>

<header id="app" style="display:none">
  <div class="header-logo-text">FOLLOW<span>.</span> CEO</div>
  <div id="live-date" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)"></div>
</header>

<main id="main-app" style="display:none">
  <div class="hero-balance">
    <div class="stat-title">CAPITAL TOTAL DISPONIBLE</div>
    <div class="balance-amount" id="total-capital">0,00 €</div>
    <button class="btn-virement" onclick="alert('Demande de virement envoyée à Stripe/Amazon. Délai estimé: 48h.')">💸 VIRER VERS MON COMPTE PERSO</button>
  </div>

  <div class="grid-stats">
    <div class="stat-card">
        <div class="stat-title">📦 BOUTIQUE SHOPIFY (AliExpress)</div>
        <div class="stat-value" id="val-shopify" style="color:var(--green)">0.00 €</div>
        <button class="btn-update" onclick="updateVal('shopify')">MODIFIER</button>
    </div>
    <div class="stat-card">
        <div class="stat-title">🛒 AFFILIATION AMAZON</div>
        <div class="stat-value" id="val-amazon" style="color:var(--blue)">0.00 €</div>
        <button class="btn-update" onclick="updateVal('amazon')">MODIFIER</button>
    </div>
    <div class="stat-card">
        <div class="stat-title">🤖 AFFILIATION OUTILS IA</div>
        <div class="stat-value" id="val-ia" style="color:var(--gold)">0.00 €</div>
        <button class="btn-update" onclick="updateVal('ia')">MODIFIER</button>
    </div>
  </div>
</main>

<script>
const PIN = '1234';
let data = { shopify: 0, amazon: 0, ia: 0 };

function unlock() {
    if(document.getElementById('lock-input').value === PIN) {
        document.getElementById('lock').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('main-app').style.display = 'block';
        refresh();
    }
}

function updateVal(type) {
    let newVal = prompt("Entrez le nouveau montant pour " + type);
    if (newVal != null) {
        data[type] = parseFloat(newVal);
        refresh();
    }
}

function refresh() {
    document.getElementById('val-shopify').textContent = data.shopify.toLocaleString() + ' €';
    document.getElementById('val-amazon').textContent = data.amazon.toLocaleString() + ' €';
    document.getElementById('val-ia').textContent = data.ia.toLocaleString() + ' €';
    let total = data.shopify + data.amazon + data.ia;
    document.getElementById('total-capital').textContent = total.toLocaleString() + ' €';
}

setInterval(() => { document.getElementById('live-date').textContent = new Date().toLocaleString('fr-FR'); }, 1000);
</script>

</body>
</html>
